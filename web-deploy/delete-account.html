<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>アカウント削除｜残高予報</title><link rel="stylesheet" href="/legal.css"><script src="/cloud-config.js"></script></head><body><main><a href="./index.html">← アプリへ戻る</a><div class="panel"><h1>クラウドアカウント削除</h1><p>アプリを削除済みでも、このページからログインしてクラウドアカウント削除を開始できます。端末内に残るブラウザデータは、この操作では削除されません。RevenueCat顧客レコードも削除を試行しますが、Apple／Googleの購読契約自体は解約されません。先にストアのサブスクリプション管理で解約してください。</p><div id="cfgWarning" class="alert hidden"></div><label>メールアドレス<input id="email" type="email" autocomplete="email"></label><label>パスワード<input id="password" type="password" autocomplete="current-password"></label><button id="login" class="primary" type="button">本人確認</button><div id="deletePanel" class="hidden"><p class="danger"><strong>削除後はクラウドデータを復元できません。</strong></p><label>確認文字<input id="confirmation" placeholder="削除"></label><button id="delete" class="danger" type="button">完全に削除する</button></div><div id="status" class="alert hidden"></div><p class="small">共有家計の所有者で他メンバーがいる場合、削除は拒否されます。先にアプリ内でメンバーを解除するか、別メンバーへ所有権を移管してください。</p></div></main><script>
"use strict";const cfg=window.ZANDAKA_CLOUD_CONFIG||{},url=String(cfg.supabaseUrl||"").replace(/\/+$/,"");const key=cfg.supabasePublishableKey||"";let session=null;const status=(m,bad=false)=>{const e=document.getElementById("status");e.textContent=m;e.className=`alert ${bad?"danger":""}`};if(!url||!key){const e=document.getElementById("cfgWarning");e.textContent="cloud-config.jsにSupabase接続設定がありません。";e.classList.remove("hidden");document.getElementById("login").disabled=true}async function parse(r){const t=await r.text();let b;try{b=JSON.parse(t)}catch{b=t}if(!r.ok)throw new Error(b?.message||b?.error_description||b?.error||String(b));return b}document.getElementById("login").onclick=async()=>{try{session=await parse(await fetch(`${url}/auth/v1/token?grant_type=password`,{method:"POST",headers:{apikey:key,"Content-Type":"application/json"},body:JSON.stringify({email:email.value.trim(),password:password.value})}));document.getElementById("deletePanel").classList.remove("hidden");status("本人確認が完了しました。") }catch(e){status(e.message,true)}};document.getElementById("delete").onclick=async()=>{if(confirmation.value!=="削除")return status("確認欄へ「削除」と入力してください。",true);try{await parse(await fetch(`${url}/functions/v1/${encodeURIComponent(cfg.accountDeleteFunction||"delete-account")}`,{method:"POST",headers:{apikey:key,Authorization:`Bearer ${session.access_token}`,"Content-Type":"application/json"},body:JSON.stringify({confirmation:"削除"})}));status("クラウドアカウントを削除しました。");document.getElementById("deletePanel").classList.add("hidden")}catch(e){status(e.message,true)}};
</script></body></html>
